<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Menlo, 'SF Mono', Consolas, monospace">
  <!-- background -->
  <rect width="1200" height="630" fill="#0d1117"/>
  <!-- terminal window -->
  <rect x="48" y="48" width="1104" height="534" rx="16" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <!-- title bar -->
  <rect x="48" y="48" width="1104" height="44" rx="16" fill="#21262d"/>
  <rect x="48" y="76" width="1104" height="16" fill="#21262d"/>
  <circle cx="78" cy="70" r="7" fill="#ff5f56"/>
  <circle cx="102" cy="70" r="7" fill="#ffbd2e"/>
  <circle cx="126" cy="70" r="7" fill="#27c93f"/>
  <text x="600" y="75" fill="#8b949e" font-size="16" text-anchor="middle">catunes — terminal</text>

  <!-- left: brand + copy -->
  <text x="90" y="180" fill="#3fb950" font-size="64" font-weight="bold">ᓚᘏᗢ catunes</text>
  <text x="92" y="225" fill="#c9d1d9" font-size="26">Reproductor de música retro para la terminal</text>

  <!-- spectrum bars -->
  <g fill="#3fb950">
    <rect x="92"  y="290" width="14" height="40"/>
    <rect x="112" y="270" width="14" height="60"/>
    <rect x="132" y="240" width="14" height="90"/>
    <rect x="152" y="285" width="14" height="45"/>
    <rect x="172" y="255" width="14" height="75"/>
    <rect x="192" y="300" width="14" height="30"/>
    <rect x="212" y="262" width="14" height="68"/>
    <rect x="232" y="232" width="14" height="98"/>
    <rect x="252" y="278" width="14" height="52"/>
    <rect x="272" y="248" width="14" height="82"/>
    <rect x="292" y="295" width="14" height="35"/>
    <rect x="312" y="266" width="14" height="64"/>
  </g>
  <g fill="#d29922">
    <rect x="332" y="250" width="14" height="80"/>
    <rect x="352" y="284" width="14" height="46"/>
    <rect x="372" y="258" width="14" height="72"/>
    <rect x="392" y="298" width="14" height="32"/>
  </g>
  <g fill="#f85149">
    <rect x="412" y="272" width="14" height="58"/>
    <rect x="432" y="244" width="14" height="86"/>
  </g>

  <!-- features -->
  <text x="92" y="392" fill="#c9d1d9" font-size="22">🎧  YouTube · radios · archivos locales   🚫 sin descargas</text>
  <text x="92" y="428" fill="#c9d1d9" font-size="22">🎚️  ecualizador 10 bandas   📊  visualizador en vivo</text>
  <text x="92" y="464" fill="#c9d1d9" font-size="22">🎨  temas   🌍  multi-idioma   🐱  gato animado</text>

  <!-- install -->
  <rect x="90" y="492" width="560" height="48" rx="8" fill="#0d1117" stroke="#30363d"/>
  <text x="108" y="523" fill="#3fb950" font-size="24">$ npm install -g catunes</text>

  <!-- footer -->
  <text x="92" y="566" fill="#8b949e" font-size="18">github.com/R0MADEV/catunes   ·   macOS · Linux · Windows   ·   MIT</text>

  <!-- right: the cat -->
  <g fill="#3fb950" font-size="22" font-weight="bold">
    <text x="800" y="250" xml:space="preserve">   ▄▀▄       ▄▀▄</text>
    <text x="800" y="278" xml:space="preserve">  █   ▀▄▄▄▄▄▀   █</text>
    <text x="800" y="306" xml:space="preserve">  █  ●       ●  █</text>
    <text x="800" y="334" xml:space="preserve">─── █     ▄     █ ───</text>
    <text x="800" y="362" xml:space="preserve">─── █   ▀▀▀▀▀   █ ───</text>
    <text x="800" y="390" xml:space="preserve">   ▀▄▄▄▄▄▄▄▄▄▄▄▀</text>
    <text x="800" y="418" xml:space="preserve">▄▄▄▄█   █   █   █▄▄▄▄</text>
    <text x="800" y="446" xml:space="preserve">   ▀▄▄▄▀   ▀▄▄▄▀</text>
  </g>
</svg>
